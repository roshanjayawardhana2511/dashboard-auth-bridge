<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Moneta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; background: #1a1d29; color: #f5f6f8; }
  #card { text-align: center; padding: 40px; }
  #logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 8px; }
  #wordmark { font-weight: 500; letter-spacing: 3px; font-size: 30px; color: #f5f6f8; }
  #tagline { font-size: 12px; letter-spacing: 3px; color: #6b7280; margin-bottom: 40px; }
  #gBtn { display: flex; justify-content: center; min-height: 44px; }
  #status { margin-top: 16px; font-size: 13px; color: #a0a4b0; min-height: 18px; }
</style>
</head>
<body>
<div id="card">
  <div id="logo">
    <svg width="44" height="44" viewBox="0 0 100 100">
      <ellipse cx="50" cy="62" rx="34" ry="11" fill="#f5a623" opacity="0.55"/>
      <ellipse cx="50" cy="50" rx="34" ry="11" fill="#f5a623" opacity="0.8"/>
      <ellipse cx="50" cy="38" rx="34" ry="11" fill="#f5a623"/>
    </svg>
    <div id="wordmark">MONETA</div>
  </div>
  <div id="tagline">FINANCIAL COMMAND CENTRE</div>
  <div id="gBtn"></div>
  <div id="status"></div>
</div>
<script>
// ⚠ Set this to your actual Apps Script exec URL.
var DASHBOARD_EXEC_URL = 'https://script.google.com/macros/s/AKfycbw1PXdqc4jHBS17owy7KmG4kEyeWx9KSe2OVLmRglrxkcmC4nUgoCYlZp3GhEcN8_LW/exec';

var CLIENT_ID = '39512774122-oea55p7a0pq9t4j4l4mp2gobfju5qbhm.apps.googleusercontent.com';
var STATUS = document.getElementById('status');

function handleCredentialResponse(response) {
  STATUS.textContent = 'Signed in — loading Moneta…';
  // Full-page redirect (not a popup) straight into the dashboard, carrying
  // the verified ID token. doGet() reads it server-side and the dashboard
  // auto-signs-in with no second button/click on the other end.
  window.location.href = DASHBOARD_EXEC_URL + '?token=' + encodeURIComponent(response.credential);
}

function init() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(init, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('gBtn'),
    { theme: 'filled_black', size: 'large', type: 'standard', text: 'signin_with', shape: 'pill' }
  );
}
init();
</script>
</body>
</html>
