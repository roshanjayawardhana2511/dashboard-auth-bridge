<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Moneta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; }
  #wrap { display: flex; min-height: 100vh; }
  #left { flex: 1.1; background: #14161f; display: flex; align-items: center; justify-content: center;
          padding: 40px; }
  #left-inner { text-align: center; }
  #left-inner svg { width: 120px; height: 120px; }
  #left-wordmark { font-weight: 700; letter-spacing: 6px; font-size: 44px; color: #f5f6f8; margin-top: 12px; }
  #left-tagline { font-size: 13px; letter-spacing: 4px; color: #6b7280; margin-top: 10px; }
  #right { flex: 1; background: #1a1d29; display: flex; align-items: center; justify-content: center;
           padding: 40px; }
  #card { width: 100%; max-width: 340px; text-align: center; }
  #card-title { font-size: 22px; font-weight: 500; color: #f5f6f8; margin-bottom: 6px; }
  #card-sub { font-size: 13px; color: #a0a4b0; margin-bottom: 36px; }
  #gBtn { display: flex; justify-content: center; min-height: 44px; }
  #status { margin-top: 16px; font-size: 13px; color: #a0a4b0; min-height: 18px; }
  @media (max-width: 720px) {
    #wrap { flex-direction: column; }
    #left { flex: none; padding: 50px 20px 30px; }
    #left-inner svg { width: 80px; height: 80px; }
    #left-wordmark { font-size: 32px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <div id="left-inner">
      <svg viewBox="0 0 100 100">
        <ellipse cx="50" cy="62" rx="34" ry="11" fill="#f5a623" opacity="0.55"/>
        <ellipse cx="50" cy="50" rx="34" ry="11" fill="#f5a623" opacity="0.8"/>
        <ellipse cx="50" cy="38" rx="34" ry="11" fill="#f5a623"/>
      </svg>
      <div id="left-wordmark">MONETA</div>
      <div id="left-tagline">FINANCIAL COMMAND CENTRE</div>
    </div>
  </div>
  <div id="right">
    <div id="card">
      <div id="card-title">Welcome back</div>
      <div id="card-sub">Sign in to access your dashboard</div>
      <div id="gBtn"></div>
      <div id="status"></div>
    </div>
  </div>
</div>
<script>
// ⚠ Set this to your actual Apps Script exec URL.
var DASHBOARD_EXEC_URL = 'https://script.google.com/macros/s/AKfycbw1PXdqc4jHBS17owy7KmG4kEyeWx9KSe2OVLmRglrxkcmC4nUgoCYlZp3GhEcN8_LW/exec';

var CLIENT_ID = '39512774122-oea55p7a0pq9t4j4l4mp2gobfju5qbhm.apps.googleusercontent.com';
var STATUS = document.getElementById('status');

function handleCredentialResponse(response) {
  STATUS.textContent = 'Signed in — loading Moneta…';
  window.location.href = DASHBOARD_EXEC_URL + '?token=' + encodeURIComponent(response.credential);
}

function init() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(init, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('gBtn'),
    { theme: 'filled_black', size: 'large', type: 'standard', text: 'signin_with', shape: 'pill', width: 300 }
  );
}
init();
</script>
</body>
</html>
