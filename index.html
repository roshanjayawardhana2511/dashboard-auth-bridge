<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Moneta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; }
  #wrap { display: flex; min-height: 100vh; }
  #left { flex: 1.1; background: #14161f; display: flex; align-items: center; justify-content: center;
          padding: 40px; }
  #left-inner { text-align: center; }
  #left-inner svg { width: 150px; height: auto; }
  #left-wordmark { font-weight: 700; letter-spacing: 6px; font-size: 44px; color: #f5f6f8; margin-top: 4px; }
  #left-tagline { font-size: 13px; letter-spacing: 4px; color: #6b7280; margin-top: 10px; }
  #right { flex: 1; background: #1a1d29; display: flex; align-items: center; justify-content: center;
           padding: 40px; }
  #card { width: 100%; max-width: 340px; text-align: center; }
  #card-title { font-size: 22px; font-weight: 500; color: #f5f6f8; margin-bottom: 6px; }
  #card-sub { font-size: 13px; color: #a0a4b0; margin-bottom: 36px; }
  #gBtn { display: flex; justify-content: center; min-height: 44px; }
  #status { margin-top: 16px; font-size: 13px; color: #a0a4b0; min-height: 18px; }
  @media (max-width: 720px) {
    #wrap { flex-direction: column; }
    #left { flex: none; padding: 50px 20px 30px; }
    #left-inner svg { width: 100px; }
    #left-wordmark { font-size: 32px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <div id="left-inner">
      <svg viewBox="0 0 200 170">
        <defs>
        <g id="isocoin">
        <path d="M-38 0 A38 15 0 0 0 38 0 L38 14 A38 15 0 0 1 -38 14 Z" fill="#c97e10"/>
        <g stroke="#a5670c" stroke-width="1.6" opacity="0.7">
        <line x1="-36" y1="1.5" x2="-36" y2="15.5"/>
        <line x1="-27" y1="7" x2="-27" y2="21"/>
        <line x1="-14" y1="11.5" x2="-14" y2="25.5"/>
        <line x1="0" y1="13" x2="0" y2="27"/>
        <line x1="14" y1="11.5" x2="14" y2="25.5"/>
        <line x1="27" y1="7" x2="27" y2="21"/>
        <line x1="36" y1="1.5" x2="36" y2="15.5"/>
        </g>
        <ellipse cx="0" cy="0" rx="38" ry="15" fill="#f5a623"/>
        <ellipse cx="0" cy="0" rx="38" ry="15" fill="none" stroke="#c97e10" stroke-width="1.5"/>
        </g>
        </defs>
        <g transform="translate(100,120)">
        <g transform="translate(0,-58)">
        <use href="#isocoin"/>
        <use href="#isocoin" y="-20"/>
        <use href="#isocoin" y="-40"/>
        <use href="#isocoin" y="-60"/>
        <use href="#isocoin" y="-80"/>
        </g>
        <g transform="translate(-42,6)">
        <use href="#isocoin"/>
        <use href="#isocoin" y="-20"/>
        </g>
        <g transform="translate(38,10)">
        <use href="#isocoin"/>
        <use href="#isocoin" y="-20"/>
        <use href="#isocoin" y="-40"/>
        </g>
        </g>
      </svg>
      <div id="left-wordmark">MONETA</div>
      <div id="left-tagline">FINANCIAL COMMAND CENTRE</div>
    </div>
  </div>
  <div id="right">
    <div id="card">
      <div id="card-title">Welcome back</div>
      <div id="card-sub">Sign in to access your dashboard</div>
      <div id="gBtn"></div>
      <div id="status"></div>
    </div>
  </div>
</div>
<script>
// ⚠ Set this to your actual Apps Script exec URL.
var DASHBOARD_EXEC_URL = 'https://script.google.com/macros/s/AKfycbw1PXdqc4jHBS17owy7KmG4kEyeWx9KSe2OVLmRglrxkcmC4nUgoCYlZp3GhEcN8_LW/exec';

var CLIENT_ID = '39512774122-oea55p7a0pq9t4j4l4mp2gobfju5qbhm.apps.googleusercontent.com';
var STATUS = document.getElementById('status');

function handleCredentialResponse(response) {
  STATUS.textContent = 'Signed in — loading Moneta…';
  window.location.href = DASHBOARD_EXEC_URL + '?token=' + encodeURIComponent(response.credential);
}

function init() {
  if (typeof google === 'undefined' || !google.accounts) {
    setTimeout(init, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('gBtn'),
    { theme: 'filled_black', size: 'large', type: 'standard', text: 'signin_with', shape: 'pill', width: 300 }
  );
}
init();
</script>
</body>
</html>
