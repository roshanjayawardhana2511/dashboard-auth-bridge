<meta charset="utf-8">
<title>Moneta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; }
  #wrap { display: flex; min-height: 100vh; }
  #left { flex: 1.1; background-image: url('moneta-hero.png'); background-size: cover;
          background-position: center; background-repeat: no-repeat; min-height: 100vh; }
  #right { flex: 1; background: #1a1d29; display: flex; flex-direction: column;
           padding: 40px; }
  #right-brand { display: flex; align-items: center; gap: 14px; }
  #right-brand svg { width: 64px; height: auto; }
  #right-wordmark { font-weight: 700; letter-spacing: 4px; font-size: 28px; color: #f5f6f8; }
  #right-tagline { font-size: 11px; letter-spacing: 3px; color: #6b7280; margin-top: 2px; }
  #right-center { flex: 1; display: flex; align-items: center; justify-content: center; }
  #card { width: 100%; max-width: 340px; text-align: center; }
  #card-title { font-size: 22px; font-weight: 500; color: #f5f6f8; margin-bottom: 6px; }
  #card-sub { font-size: 13px; color: #a0a4b0; margin-bottom: 36px; }
  #gBtn { display: flex; justify-content: center; min-height: 44px; }
  #status { margin-top: 16px; font-size: 13px; color: #a0a4b0; min-height: 18px; }
  @media (max-width: 720px) {
    #wrap { flex-direction: column; }
    #left { flex: none; min-height: 220px; }
    #right-brand svg { width: 44px; }
    #right-wordmark { font-size: 22px; }
  }
</style>
